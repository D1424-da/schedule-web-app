<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
    <title>全体ページ | 週間予定表管理システム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="overall" class="auth-locked">
    <header class="topbar">
      <h1>全体ページ</h1>
      <p class="subtitle">全員の予定を確認</p>
      <div class="page-links">
        <a href="personal.html" class="btn btn-secondary">個人入力ページへ</a>
        <a href="index.html" class="btn btn-ghost">入口へ戻る</a>
      </div>
      <div class="auth-bar">
        <span id="currentUserLabel" class="current-user">ログイン: 未ログイン</span>
        <button id="openLoginBtn" class="btn btn-secondary" type="button">ログイン</button>
        <button id="logoutBtn" class="btn btn-ghost" type="button">ログアウト</button>
      </div>
      <div class="notification-tools">
        <button id="enableNotificationsBtn" class="btn btn-secondary" type="button">通知を有効にする</button>
        <span id="notificationStatus" class="notification-status">端末通知: 未設定</span>
      </div>
    </header>

    <main class="container">
      <section class="card controls" aria-label="週移動">
        <div class="week-nav">
          <button id="prevWeekBtn" class="btn">前の週</button>
          <button id="todayBtn" class="btn btn-secondary">今週</button>
          <button id="nextWeekBtn" class="btn">次の週</button>
        </div>
        <div id="weekLabel" class="week-label"></div>
      </section>

      <section class="card" aria-label="週間予定表">
        <div class="table-wrap">
          <table id="scheduleTable" class="schedule-table"></table>
        </div>
      </section>

      <p id="syncAlert" class="sync-alert hidden" aria-live="polite"></p>

      <section class="card" aria-label="管理設定">
        <div class="settings-header">
          <h2>休日設定（管理者）</h2>
          <button id="toggleSettingsBtn" class="btn btn-secondary">開く / 閉じる</button>
        </div>

        <div id="settingsPanel" class="settings-panel hidden">
          <div class="field-row">
            <label>
              <input type="checkbox" id="holidayAutoEnabled" />
              祝日自動取得を有効にする
            </label>
          </div>

          <h3>閑散期（毎週土曜休み）</h3>
          <div class="field-grid">
            <label for="dullStartMonth">開始月</label>
            <select id="dullStartMonth"></select>
            <label for="dullEndMonth">終了月</label>
            <select id="dullEndMonth"></select>
          </div>

          <h3>繁忙期（隔週土曜休み）</h3>
          <div class="field-grid">
            <label for="busyStartMonth">開始月</label>
            <select id="busyStartMonth"></select>
            <label for="busyEndMonth">終了月</label>
            <select id="busyEndMonth"></select>
            <label for="biweeklyPattern">隔週ルール</label>
            <select id="biweeklyPattern">
              <option value="1-3">第1・第3土曜休み</option>
              <option value="2-4">第2・第4土曜休み</option>
            </select>
          </div>

          <div class="field-row">
            <button id="saveSettingsBtn" class="btn">設定を保存</button>
          </div>
        </div>
      </section>

      <section class="card" aria-label="利用者登録">
        <div class="settings-header">
          <h2>利用者の新規登録</h2>
          <button id="toggleRegisterBtn" class="btn btn-secondary">開く / 閉じる</button>
        </div>
        <div id="registerPanel" class="settings-panel hidden">
        <p class="subtitle-mini">IDは名前として登録されます。パスワードは誕生日（例: 19600123）です。</p>
        <div class="field-grid">
          <label for="registerNameInput">名前（ID）</label>
          <input id="registerNameInput" type="text" placeholder="例: 山田太郎" />
          <label for="registerBirthdayInput">誕生日（パスワード）</label>
          <input id="registerBirthdayInput" type="text" placeholder="例: 19600123 / 1960-01-23" />
        </div>
        <div class="field-row">
          <button id="registerUserBtn" class="btn">新規登録する</button>
        </div>

        <hr class="section-divider" />

        <div class="settings-header">
          <h2>表示順の並び替え（管理者）</h2>
        </div>
        <p class="subtitle-mini">上下ボタンで順序を変更できます。パスワードは伏せて表示されます。</p>
        <ul id="userOrderList" class="user-order-list" aria-label="利用者並び順"></ul>
        </div>
      </section>

      <p id="notice" class="notice" aria-live="polite"></p>
    </main>

    <dialog id="loginDialog" class="edit-dialog">
      <form id="loginForm" method="dialog">
        <h2>ログイン</h2>
        <p class="edit-meta">名前(ID)と誕生日でログインしてください。</p>

        <label for="loginIdInput">ログインID（名前）</label>
        <input id="loginIdInput" type="text" required placeholder="例: 本社A" />

        <label for="loginPasswordInput">パスワード（誕生日）</label>
        <input id="loginPasswordInput" type="password" required placeholder="例: 19600123" />

        <div class="dialog-buttons">
          <button id="loginSubmitBtn" value="login" class="btn">ログイン</button>
          <button id="loginCancelBtn" value="cancel" class="btn btn-ghost" type="button">閉じる</button>
        </div>
      </form>
    </dialog>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
