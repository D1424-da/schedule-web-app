<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
    <title>個人入力ページ | 週間予定表管理システム</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="personal" class="auth-locked">
    <header class="topbar">
      <h1>個人入力ページ</h1>
      <p class="subtitle">自分の予定を入力</p>
      <div class="page-links">
        <a href="overall.html" class="btn btn-secondary">全体ページへ</a>
        <a href="index.html" class="btn btn-ghost">入口へ戻る</a>
      </div>
      <div class="auth-bar">
        <span id="currentUserLabel" class="current-user">ログイン: 未ログイン</span>
        <button id="openLoginBtn" class="btn btn-secondary" type="button">ログイン</button>
        <button id="logoutBtn" class="btn btn-ghost" type="button">ログアウト</button>
      </div>
      <div class="notification-tools">
        <button id="enableNotificationsBtn" class="btn btn-secondary" type="button">通知を有効にする</button>
        <button id="toggleScheduleNotificationsBtn" class="btn btn-secondary" type="button">更新通知を無効にする</button>
        <button id="toggleRequestNotificationsBtn" class="btn btn-secondary" type="button">確認依頼通知を無効にする</button>
        <span id="notificationStatus" class="notification-status">端末通知: 未設定</span>
      </div>
    </header>

    <main class="container">
      <section class="card controls" aria-label="週移動">
        <div class="week-nav">
          <button id="prevWeekBtn" class="btn">前の週</button>
          <button id="todayBtn" class="btn btn-secondary">今週</button>
          <button id="nextWeekBtn" class="btn">次の週</button>
          <button id="finalizeScheduleBtn" class="btn btn-secondary" type="button">入力を確定して通知</button>
        </div>
        <div id="weekLabel" class="week-label"></div>
      </section>

      <section class="card" aria-label="週間予定表">
        <div class="table-wrap">
          <table id="scheduleTable" class="schedule-table"></table>
        </div>
        <div id="scheduleScrollbar" class="table-scrollbar hidden" aria-hidden="true">
          <div id="scheduleScrollbarInner" class="table-scrollbar-inner"></div>
        </div>
        <p class="scroll-hint">左右にスクロールして全日程を表示できます。</p>
      </section>

      <section id="personalBusinessNoteSection" class="card" aria-label="業務欄">
        <div class="settings-header">
          <h2>今週の業務欄</h2>
          <button id="saveBusinessNoteBtn" class="btn btn-secondary" type="button">業務欄を保存</button>
        </div>
        <textarea id="businessNoteInput" class="business-note-input" rows="4" placeholder="今週の連絡事項・業務メモを入力してください"></textarea>
        <p id="businessNoteMeta" class="subtitle-mini">保存すると全体ページへ即時反映されます。</p>
      </section>

      <section class="card monthly-card" aria-label="月間予定表">
        <div class="month-nav">
          <button id="prevMonthBtn" class="btn btn-secondary" type="button">前月</button>
          <button id="currentMonthBtn" class="btn btn-ghost" type="button">当月</button>
          <button id="nextMonthBtn" class="btn btn-secondary" type="button">次月</button>
        </div>
        <div id="monthLabel" class="month-label"></div>
        <table id="monthlyScheduleTable" class="monthly-table"></table>
      </section>

      <p id="syncAlert" class="sync-alert hidden" aria-live="polite"></p>
      <section id="requestInboxSection" class="card request-inbox hidden" aria-label="確認依頼">
        <div class="settings-header">
          <h2>確認依頼</h2>
        </div>
        <ul id="requestInboxList" class="request-list"></ul>
      </section>
      <p id="notice" class="notice" aria-live="polite"></p>
    </main>

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" method="dialog">
        <h2>予定編集</h2>
        <p id="editMeta" class="edit-meta"></p>

        <label for="statusInput">状態</label>
        <select id="statusInput" required>
          <option value="現場">現場</option>
          <option value="内業">内業</option>
          <option value="打合せ">打合せ</option>
          <option value="移動">移動</option>
          <option value="休み">休み</option>
          <option value="午前休">午前休</option>
          <option value="午後休">午後休</option>
          <option value="有給">有給</option>
          <option value="午前有休">午前有休</option>
          <option value="午後有休">午後有休</option>
        </select>

        <label for="workInput">業務内容</label>
        <input id="workInput" type="text" placeholder="例: 官場線 作業準備" />

        <label for="placeInput">場所</label>
        <input id="placeInput" type="text" placeholder="例: 鹿児島市" />

        <div class="repeat-row">
          <label>
            <input id="repeatEnabled" type="checkbox" />
            日にちを繰り返し入力する
          </label>
          <label for="repeatCount">回数</label>
          <select id="repeatCount" aria-label="繰り返し回数">
            <option value="1">1日分</option>
            <option value="2">2日分</option>
            <option value="3">3日分</option>
            <option value="4">4日分</option>
            <option value="5">5日分</option>
            <option value="6">6日分</option>
            <option value="7">7日分</option>
            <option value="8">8日分</option>
            <option value="9">9日分</option>
            <option value="10">10日分</option>
            <option value="11">11日分</option>
            <option value="12">12日分</option>
          </select>
        </div>

        <div class="request-row">
          <label>
            <input id="requestConfirmEnabled" type="checkbox" />
            保存前に相手へ確認依頼を送る
          </label>
          <label for="requestTargetInput">確認相手</label>
          <select id="requestTargetInput">
            <option value="">選択してください</option>
          </select>
          <label for="requestMessageInput">依頼メモ</label>
          <input id="requestMessageInput" type="text" maxlength="80" placeholder="例: 午前から同行可能ですか？" />
        </div>

        <div class="dialog-buttons">
          <button id="saveEntryBtn" value="save" class="btn">保存する</button>
          <button id="clearEntryBtn" value="clear" class="btn btn-secondary" type="button">手動入力を解除</button>
          <button id="cancelEntryBtn" value="cancel" class="btn btn-ghost" type="button">保存しない</button>
        </div>
      </form>
    </dialog>

    <dialog id="loginDialog" class="edit-dialog">
      <form id="loginForm" method="dialog">
        <h2>個人ログイン</h2>
        <p class="edit-meta">ID、パスワードを入力してください</p>

        <label for="loginIdInput">ID</label>
        <input id="loginIdInput" type="text" required placeholder="例: 本社A" />

        <label for="loginPasswordInput">パスワード</label>
        <input id="loginPasswordInput" type="password" required placeholder="例: 19600123" />

        <div class="dialog-buttons">
          <button id="loginSubmitBtn" value="login" class="btn">ログイン</button>
          <button id="loginCancelBtn" value="cancel" class="btn btn-ghost" type="button">閉じる</button>
        </div>
      </form>
    </dialog>

    <script src="firebase-config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
  </body>
</html>
